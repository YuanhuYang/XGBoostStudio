# 将 docs/wiki 同步到 GitHub Wiki（.wiki.git）。需先在仓库 Wiki 创建首页，并配置 WIKI_PUSH_TOKEN。
name: Sync GitHub Wiki

on:
  push:
    branches: [main, master]
    paths:
      - "docs/wiki/**"
      - "scripts/sync_github_wiki.py"
      - ".github/workflows/sync-wiki.yml"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    if: ${{ secrets.WIKI_PUSH_TOKEN != '' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Build wiki tree
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          REF_BRANCH: ${{ github.ref_name }}
        run: |
          python3 scripts/sync_github_wiki.py \
            --repo "${GITHUB_REPOSITORY}" \
            --branch "${REF_BRANCH}" \
            --out "${RUNNER_TEMP}/wiki_export"

      - name: Clone wiki and push
        env:
          WIKI_PUSH_TOKEN: ${{ secrets.WIKI_PUSH_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -e
          git clone "https://x-access-token:${WIKI_PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git" "${RUNNER_TEMP}/wiki_repo"
          cd "${RUNNER_TEMP}/wiki_repo"
          find . -mindepth 1 -maxdepth 1 ! -name ".git" -exec rm -rf {} +
          cp -a "${RUNNER_TEMP}/wiki_export"/. .
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -A
          if git diff --staged --quiet; then
            echo "No wiki changes to commit."
            exit 0
          fi
          git commit -m "Sync wiki from ${GITHUB_REPOSITORY}@${GITHUB_SHA}"
          git push
