name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies (lockfile)
        run: npm ci
        working-directory: client

      - name: Build Windows installers
        shell: pwsh
        run: ./scripts/build-all.ps1

      - name: Stage Windows assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release-assets | Out-Null
          Copy-Item -Path "dist/XGBoost Studio Setup *.exe" -Destination release-assets/
          Get-ChildItem -Path dist -Filter "*.exe" | Where-Object { $_.Name -notmatch "Setup" } | ForEach-Object { Copy-Item $_.FullName -Destination release-assets/ }

      - uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: release-assets/

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Build macOS bundles
        run: chmod +x scripts/build-all.sh && ./scripts/build-all.sh

      - name: Stage macOS assets
        run: |
          mkdir -p release-assets
          shopt -s nullglob
          for f in dist/*.dmg dist/*.zip; do
            [[ -e "$f" ]] || continue
            cp "$f" release-assets/
          done

      - uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: release-assets/

  build-linux-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: PyInstaller Linux backend
        working-directory: server
        run: |
          uv sync --all-groups --frozen
          uv run pyinstaller build.spec --noconfirm

      - name: Pack backend tarball
        run: |
          mkdir -p release-assets
          TAG="${{ github.ref_name }}"
          tar -czvf "release-assets/xgboost-server-${TAG}-linux-x64.tar.gz" -C server/dist xgboost-server

      - uses: actions/upload-artifact@v4
        with:
          name: release-linux-server
          path: release-assets/

  publish:
    needs: [build-windows, build-macos, build-linux-server]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: _artifacts
          pattern: release-*
          merge-multiple: true

      - name: Flatten assets for upload
        run: |
          mkdir -p release-flat
          find _artifacts -type f \( -name '*.exe' -o -name '*.dmg' -o -name '*.zip' -o -name '*.tar.gz' \) -print -exec cp -t release-flat {} +
          ls -la release-flat

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            **安装包说明**

            - **Windows**：`Setup` 为 NSIS 安装包；另一 `.exe` 为 portable 免安装版。
            - **macOS**：`.dmg` / `.zip`；当前 CI 产物**未做代码签名与公证**，首次打开可能需在「隐私与安全性」中放行或使用右键打开。
            - **Linux**：**不发布 Electron**。Release 提供 `xgboost-server-<tag>-linux-x64.tar.gz`（PyInstaller 单文件后端）；解压后赋予可执行权限运行，再配合浏览器（`npm run dev:web` 等）与 CLI，见 `docs/wiki/11-mac-linux-distribution.md`。

            Windows / macOS 桌面包见 `docs/wiki/10-windows-distribution.md` 与同页姊妹篇。
          files: release-flat/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
