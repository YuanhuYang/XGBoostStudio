name: CI

on:
  push:
    branches: [main, master, test]
  pull_request:
    branches: [main, master, test]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --all-groups --frozen
      - name: Pytest
        run: uv run pytest -q

  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json
      - name: Install, test, typecheck
        run: |
          npm ci
          npm run test -- --run
          npm run typecheck

  # 不跑完整 macOS 构建；仅校验 build-all.sh 与 uv x86_64 darwin 发行包解压逻辑（PR 上尽早发现脚本回归）
  verify-macos-build-prep:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            shell: bash
          - os: windows-latest
            shell: pwsh
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Verify (Bash)
        if: matrix.shell == 'bash'
        run: bash scripts/verify-macos-build-prep.sh
      - name: Verify (PowerShell)
        if: matrix.shell == 'pwsh'
        shell: pwsh
        run: ./scripts/verify-macos-build-prep.ps1

